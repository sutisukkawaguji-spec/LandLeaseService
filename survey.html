<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        const currentRole = localStorage.getItem('userRole');
        if (!currentRole) {
            window.location.href = 'index.html';
        } else if (currentRole !== 'admin') {
            alert('สิทธิ์การใช้งานจำกัดเฉพาะผู้ดูแลระบบ!');
            window.location.href = 'index.html';
        }
    </script>
    <title>ระบบวางแผนนัดหมาย (Survey Scheduling V2)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            --primary: #4361ee;
            --primary-light: #f1f5ff;
            --success: #06d6a0;
            --danger: #ef476f;
            --warning: #ffd166;
            --dark: #0f172a;
            --sidebar-w: 380px;
            --map-w: 480px;
            --radius-md: 18px;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: #f8fafc;
            color: var(--dark);
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }

        .app-shell {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .sidebar {
            width: var(--sidebar-w);
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
            transition: 0.3s;
        }

        .main-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: #f1f5f9;
            position: relative;
        }

        .map-section {
            width: var(--map-w);
            background: #fff;
            border-left: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
        }

        .mobile-tab-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 8px;
            border-radius: 40px;
            display: none;
            gap: 4px;
            z-index: 9999;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .mobile-tab-bar button {
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            transition: 0.3s;
        }

        .mobile-tab-bar button.active {
            background: var(--primary);
            color: #fff;
        }

        .stage-view {
            display: none;
            flex-direction: column;
            height: 100%;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .stage-view.active {
            display: flex;
        }

        #req_list {
            user-select: none;
            -webkit-user-select: none;
        }

        .sidebar-item {
            border-left: 4px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        .sidebar-item:hover {
            background: #f8fafc;
        }

        .sidebar-item.selected {
            background: #e2e8f0;
            border-left-color: var(--primary);
        }

        .sidebar-item.pressing {
            background: #e2e8f0 !important;
            transform: scale(0.98);
        }

        .premium-card {
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid #e2e8f0;
        }

        .premium-card.bg-primary {
            padding: 0.75rem 1rem;
        }

        .card-accent {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 5px;
        }

        .accent-primary {
            background: var(--primary);
        }

        .accent-success {
            background: var(--success);
        }

        .pointer {
            cursor: pointer;
        }

        .hover-highlight:hover {
            background-color: rgba(67, 97, 238, 0.05) !important;
        }

        #map {
            flex: 1;
            z-index: 1;
        }

        /* Floating Map Button */
        .map-overlay-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            background: var(--danger);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(239, 71, 111, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .drag-column {
            cursor: grab;
            touch-action: none;
            width: 40px;
        }

        .drag-column:active {
            cursor: grabbing;
        }

        .sortable-ghost {
            opacity: 0.4;
            background-color: var(--primary-light) !important;
        }

        .btn-xs {
            padding: 0.1rem 0.4rem;
            font-size: 0.75rem;
            border-radius: 4px;
        }

        .btn-xxs {
            padding: 0.05rem 0.3rem;
            font-size: 0.65rem;
            border-radius: 3px;
        }

        .map-overlay-btn:hover {
            transform: scale(1.05);
            background: #d63c5e;
        }

        .gutter {
            width: 4px;
            background: transparent;
            cursor: col-resize;
            transition: 0.2s;
        }

        .gutter:hover {
            background: var(--primary);
        }

        .map-header {
            height: 60px;
        }

        @media (max-width: 1024px) {
            .map-section {
                width: 340px;
            }
        }

        @media (max-width: 768px) {
            .mobile-tab-bar {
                display: flex;
            }

            .sidebar,
            .main-stage,
            .map-section {
                display: none;
            }

            .active-mobile-view {
                display: flex !important;
                width: 100vw !important;
                height: 100vh !important;
            }

            #col-map.active-mobile-view {
                height: 100vh !important;
                position: fixed;
                top: 0;
                left: 0;
            }

            .map-header {
                position: absolute;
                top: 10px;
                left: 10px;
                right: 10px;
                z-index: 1000;
                border: none !important;
                background: rgba(255, 255, 255, 0.9) !important;
                backdrop-filter: blur(8px);
                border-radius: 15px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
                height: 50px !important;
            }

            .stage-view {
                padding-bottom: 20px;
                height: calc(100vh - 140px);
                overflow-y: auto !important;
            }

            .gutter {
                display: none;
            }
        }

        /* Status Colors */
        .status-waiting {
            border-left: 5px solid #4361ee !important;
        }

        /* Blue - รอนัด */
        .status-called {
            border-left: 5px solid #06d6a0 !important;
        }

        /* Green - โทรนัดแล้ว/รอรังวัด */
        .status-failed {
            border-left: 5px solid #ffd166 !important;
        }

        /* Yellow - ติดต่อไม่ได้ */
        .status-postponed {
            border-left: 5px solid #f72585 !important;
        }

        /* Pink - เลื่อนนัด */
        .status-canceled {
            border-left: 5px solid #6c757d !important;
        }

        /* Gray - ยกเลิก */
        .status-surveyed {
            border-left: 5px solid #adb5bd !important;
            background-color: #f8f9fa;
            opacity: 0.8;
        }

        /* Gray - รังวัดแล้ว */

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .bg-waiting {
            background: #e0e7ff;
            color: #4361ee;
        }

        /* Blue */
        .bg-called {
            background: #dcfce7;
            color: #059669;
        }

        /* Green */
        .bg-failed {
            background: #fef9c3;
            color: #a16207;
        }

        /* Yellow */
        .bg-postponed {
            background: #fce7f3;
            color: #db2777;
        }

        /* Pink */
        .bg-canceled {
            background: #f1f5f9;
            color: #475569;
        }

        /* Gray */
        .bg-surveyed {
            background: #e9ecef;
            color: #495057;
        }

        /* Gray - Done */
        .bg-urgent {
            background: #fee2e2;
            color: #ef4444;
        }

        /* Red */
        .hover-highlight:hover {
            background: #f1f5f9;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bulk-mode-header {
            background: var(--primary) !important;
            animation: pulse-blue 2s infinite;
        }

        @keyframes pulse-blue {
            0% {
                box-shadow: 0 0 0 0 rgba(67, 97, 238, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(67, 97, 238, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(67, 97, 238, 0);
            }
        }

        /* Drag and Drop Styles */
        .sortable-ghost {
            opacity: 0.4;
            background: #e2e8f0 !important;
        }

        .drag-handle {
            cursor: grab;
            color: #94a3b8;
            padding: 10px;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        /* Marker Sequence Labels */
        .marker-label {
            background: var(--primary);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transform: translate(-50%, -100%);
        }

        .marker-label.not-today {
            background: #94a3b8;
        }

        .marker-label.today {
            background: #0ea5e9;
        }

        @media (max-width: 768px) {
            .leaflet-top {
                margin-top: 70px !important;
            }

            .leaflet-bottom {
                margin-bottom: 100px !important;
            }
        }

        /* Monthly Calendar Styles */
        .calendar-container {
            background: white;
            border-radius: var(--radius-md);
            padding: 1rem;
            box-shadow: var(--shadow);
            margin-bottom: 1rem;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .calendar-day-header {
            font-size: 0.75rem;
            font-weight: bold;
            color: #94a3b8;
            padding: 5px 0;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 10px;
            position: relative;
            transition: 0.2s;
        }

        .calendar-day:hover {
            background: #f1f5f9;
        }

        .calendar-day.active {
            background: var(--primary);
            color: white;
            font-weight: bold;
        }

        .calendar-day.today {
            border: 2px solid var(--primary);
        }

        .calendar-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            position: absolute;
            bottom: 4px;
        }

        .dot-blue {
            background: var(--primary);
        }

        .dot-gray {
            background: #94a3b8;
        }

        .dot-urgent {
            background: var(--danger);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .calendar-body {
                display: none;
                overflow: hidden;
            }

            .calendar-body.expanded {
                display: block;
            }

            .calendar-header::after {
                font-family: "Font Awesome 6 Free";
                font-weight: 900;
                content: "\f078";
                font-size: 0.8rem;
                color: #94a3b8;
                transition: 0.3s;
                margin-left: 10px;
            }

            .calendar-container.expanded .calendar-header::after {
                transform: rotate(180deg);
            }

            .calendar-container {
                padding: 0.75rem;
            }
        }
    </style>
</head>

<body>
    <div class="mobile-tab-bar">
        <button id="tab_list_mode" onclick="switchMode('list')"><i class="fa-solid fa-headset"></i>
            รอรังวัด/รอนัด</button>
        <button id="tab_schedule_mode" class="active" onclick="switchMode('schedule')"><i
                class="fa-solid fa-calendar"></i> ตารางนัด</button>
        <button id="tab_map_mode" onclick="switchMode('map')"><i class="fa-solid fa-map"></i> แผนที่</button>
        <button id="tab_urgent_mode" onclick="startUrgentTaskFlow()"><i class="fa-solid fa-bolt"></i> งานด่วน</button>
    </div>

    <div class="app-shell">
        <div class="sidebar" id="col-sidebar">
            <div class="p-3 bg-dark text-white d-flex justify-content-between align-items-center transition-all"
                id="sidebar_header">
                <div class="d-flex align-items-center gap-2">
                    <button class="btn btn-sm btn-outline-light border-0 px-2 py-1"
                        onclick="window.location.href='index.html'" title="กลับหน้าหลัก">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div class="fw-bold" id="sidebar_title">รอรังวัด/รอนัด</div>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <div id="sync_spinner" class="spinner-border spinner-border-sm text-primary d-none" role="status">
                    </div>
                    <span id="count_badge" class="badge rounded-pill bg-primary">0</span>
                </div>
            </div>
            <div class="p-3 border-bottom bg-light">
                <input type="text" class="form-control form-control-sm mb-2" id="search_box"
                    placeholder="ค้นหาชื่อ/แปลง..." onkeyup="filterList()">
                <select class="form-select form-select-sm mb-2" id="status_filter" onchange="filterList()">
                    <option value="pending">ยังไม่นัด/ยังไม่รังวัด</option>
                    <option value="not_called">ยังไม่โทร</option>
                    <option value="called">โทรแล้ว/รอนัดวัน</option>
                    <option value="surveyed">รังวัดแล้ว (สีเทา)</option>
                    <option value="all">ทั้งหมด</option>
                </select>
                <div class="d-flex gap-1 mb-2">
                    <button class="btn btn-sm btn-outline-secondary flex-grow-1" onclick="loadQueueFromSheet()"
                        title="รีเฟรช"><i class="fa-solid fa-sync me-1"></i> รีเฟรชข้อมูล</button>
                </div>
                <!-- Multi-Actions Container (Hidden by default) -->
                <div id="multi_actions" class="d-none animate-fade-in p-2 bg-light border-bottom">
                    <div class="d-flex align-items-center justify-content-between mb-2">
                        <div class="form-check mb-0">
                            <input class="form-check-input" type="checkbox" id="check_all"
                                onchange="selectAll(this.checked)">
                            <label class="form-check-label fw-bold small" for="check_all">เลือกทั้งหมด</label>
                        </div>
                        <button class="btn btn-xs btn-outline-dark px-2 py-0 small" style="font-size:0.6rem"
                            onclick="toggleMultiMode()">ยกเลิกโหมด</button>
                    </div>
                    <div class="grid d-flex gap-1">
                        <button class="btn btn-xs btn-danger flex-grow-1 py-1 small" style="font-size: 0.7rem;"
                            onclick="bulkUpdate('ยกเลิก')">ยกเลิกกลุ่ม</button>
                        <button class="btn btn-xs btn-warning flex-grow-1 py-1 small" style="font-size: 0.7rem;"
                            onclick="bulkUpdate('รอนัด')">ล้างคิวนัด</button>
                    </div>
                </div>
            </div>
            <div id="req_list" class="flex-grow-1" style="overflow-y:auto;"></div>
        </div>
        <div class="gutter" id="resizer-1"></div>
        <div class="main-stage" id="col-main">
            <div id="view_schedule" class="stage-view active">
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h4 class="fw-bold mb-1">วางแผนนัดหมายรังวัด (Smart Slot Finder)</h4>
                        <p class="text-muted small mb-0">เลือกรายการจากฝั่งซ้ายและระบุวันที่เพื่อเช็คคิวว่างอัตโนมัติ
                        </p>
                    </div>
                </div>
                <div class="row g-2 align-items-stretch">
                    <div class="col-lg-5">
                        <div class="calendar-container border border-primary h-100 mb-0" id="calendar_container">
                            <div class="calendar-header" onclick="toggleCalendar()">
                                <div class="d-flex align-items-center gap-2">
                                    <button class="btn btn-sm btn-link text-dark p-0"
                                        onclick="event.stopPropagation(); changeMonth(-1)"><i
                                            class="fa-solid fa-chevron-left"></i></button>
                                    <span class="fw-bold" id="calendar_month_year">มีนาคม 2026</span>
                                    <button class="btn btn-sm btn-link text-dark p-0"
                                        onclick="event.stopPropagation(); changeMonth(1)"><i
                                            class="fa-solid fa-chevron-right"></i></button>
                                </div>
                            </div>
                            <div class="calendar-body" id="calendar_body_wrapper">
                                <div class="calendar-grid" id="calendar_grid">
                                    <!-- Calendar Generated Here -->
                                </div>
                                <input type="hidden" id="survey_date">
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="h-100 d-flex flex-column gap-2">
                            <div id="selected_item_card"
                                class="premium-card bg-primary text-white d-flex align-items-center justify-content-between animation-fade-in d-none">
                                <div class="d-flex align-items-center gap-2">
                                    <i class="fa-solid fa-user-check"></i>
                                    <span id="current_selected_info" class="fw-bold fs-6">ยังไม่ได้เลือกรายการ</span>
                                </div>
                                <button class="btn btn-sm btn-light p-0 rounded-circle"
                                    style="width:24px; height:24px; line-height:24px;"
                                    onclick="clearPlanningTarget()"><i class="fa-solid fa-xmark"></i></button>
                            </div>
                            <!-- Planning Inputs -->
                            <div id="planning_area" class="premium-card bg-white border-primary d-none h-100">
                                <div class="row g-2">
                                    <div class="col-6 col-md-3">
                                        <label class="small fw-bold mb-0" style="font-size:0.7rem">เวลานัด</label>
                                        <input type="time" class="form-control form-control-sm" id="target_time"
                                            value="09:00" onchange="checkCollision()">
                                    </div>
                                    <div class="col-6 col-md-3">
                                        <label class="small fw-bold mb-0" style="font-size:0.7rem">ช่วงห่าง</label>
                                        <input type="number" class="form-control form-control-sm" id="target_interval"
                                            value="45">
                                    </div>
                                    <div class="col-12 col-md-6 d-flex align-items-end">
                                        <button class="btn btn-primary btn-sm w-100 py-1 fw-bold" id="btn_save_planning"
                                            onclick="savePlannedItem()">
                                            <i class="fa-solid fa-calendar-check me-1"></i> บันทึกนัดหมาย
                                        </button>
                                    </div>
                                    <div class="col-12 mt-1">
                                        <div id="collision_warning" class="text-danger small d-none animation-pulse"
                                            style="font-size:0.7rem">
                                            <i class="fa-solid fa-triangle-exclamation"></i> <span
                                                id="collision_text"></span>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-flex gap-2 mt-2 pt-2 border-top d-none d-md-flex">
                                    <div style="flex:1">
                                        <label class="small text-muted" style="font-size:0.6rem">เริ่มงาน</label>
                                        <input type="time" class="form-control form-control-sm" id="work_start"
                                            value="08:30" style="font-size:0.75rem; padding: 0.1rem 0.3rem">
                                    </div>
                                    <div style="flex:1">
                                        <label class="small text-muted" style="font-size:0.6rem">เลิกงาน</label>
                                        <input type="time" class="form-control form-control-sm" id="work_end"
                                            value="16:30" style="font-size:0.75rem; padding: 0.1rem 0.3rem">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Schedule List -->
                <div id="schedule_status_container" class="text-center p-5 bg-white rounded-3 shadow-sm d-none">
                    <div class="spinner-border text-primary mb-3"></div>
                    <p class="text-muted">กำลังตรวจสอบตารางเวลาว่าง...</p>
                </div>
                <div class="table-responsive bg-white rounded-3 shadow-sm mt-3">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th width="30"></th>
                                <th width="30" class="text-center small">#</th>
                                <th width="70">เวลา</th>
                                <th>ข้อมูลผู้ขอ</th>
                                <th width="80">เลขที่แปลง</th>
                                <th width="60" class="text-end">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="schedule_body">
                            <tr>
                                <td colspan="6" class="text-center p-4 text-muted">กรุณาเลือกรายการและวันที่</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div id="view_field" class="stage-view">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">ตารางนัดหมายระบุวัน</h4>
                    <div class="d-flex gap-2">
                        <input type="date" class="form-control form-control-sm" id="field_view_date"
                            onchange="renderFieldList()" style="width:160px;">
                    </div>
                </div>
                <div id="field_list_container" class="row g-3"></div>
            </div>
        </div>
        <div class="gutter" id="resizer-2"></div>
        <div class="map-section" id="col-map">
            <div class="map-header p-2 border-bottom d-flex justify-content-between align-items-center bg-white">
                <div class="d-flex align-items-center gap-2">
                    <span class="fw-bold d-none d-md-inline">แผนที่</span>
                    <input type="date" id="map_filter_date" class="form-control form-control-sm"
                        onchange="renderMarkers()" style="width:130px;">
                </div>
                <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-light border" onclick="locateUser()" title="ตำแหน่งปัจจุบัน"><i
                            class="fa-solid fa-location-crosshairs text-primary"></i></button>
                </div>
            </div>
            <div style="flex:1; position:relative;">
                <div id="map" style="height:100%;"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="config.js"></script>
    <script>
        const GAS_URL = CONFIG.GAS_URL;
        let map;
        let queueData = [];
        let markers = [];
        let layerControl;
        let allLayers = [];
        let currentTargetId = null;
        let selectedIds = [];
        let isMultiSelectMode = false;

        let calendarMonth = new Date().getMonth();
        let calendarYear = new Date().getFullYear();

        document.addEventListener('DOMContentLoaded', () => {
            initResizers();
            initMap();

            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const localToday = `${year}-${month}-${day}`;

            const d1 = document.getElementById('survey_date');
            const d2 = document.getElementById('field_view_date');
            const d3 = document.getElementById('map_filter_date');
            if (d1) d1.value = localToday;
            if (d2) d2.value = localToday;
            if (d3) d3.value = localToday;

            loadQueueFromSheet();
            renderMonthlyCalendar();
        });

        async function loadQueueFromSheet() {
            document.getElementById('sync_spinner').classList.remove('d-none');
            try {
                const res = await fetch(GAS_URL + '?t=' + Date.now());
                const data = await res.json();
                queueData = data;
                renderMarkers();
                filterList();
                updateDailySchedule();
                renderMonthlyCalendar();
            } catch (e) {
                console.error("Fetch Error:", e);
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
            } finally {
                document.getElementById('sync_spinner').classList.add('d-none');
            }
        }

        function getStatusBadge(st) {
            if (!st || st === 'รอนัด') return `<span class="status-badge bg-waiting">รอรังวัด</span>`;
            if (st === 'โทรนัดแล้ว') return `<span class="status-badge bg-called">โทรนัดแล้ว</span>`;
            if (st === 'ติดต่อไม่ได้') return `<span class="status-badge bg-failed">ติดต่อไม่ได้</span>`;
            if (st === 'เลื่อนนัด') return `<span class="status-badge bg-postponed">เลื่อนนัด</span>`;
            if (st === 'ยกเลิก') return `<span class="status-badge bg-canceled">ยกเลิก</span>`;
            if (st === 'รังวัดแล้ว') return `<span class="status-badge bg-surveyed">รังวัดแล้ว</span>`;
            return `<span class="status-badge bg-light">${st}</span>`;
        }

        function getStatusClass(st) {
            if (!st || st === 'รอนัด') return 'status-waiting';
            if (st === 'โทรนัดแล้ว') return 'status-called';
            if (st === 'ติดต่อไม่ได้') return 'status-failed';
            if (st === 'เลื่อนนัด') return 'status-postponed';
            if (st === 'ยกเลิก') return 'status-canceled';
            if (st === 'รังวัดแล้ว') return 'status-surveyed';
            return '';
        }

        function isScheduled(item) {
            return item.survey_date && item.survey_date !== '-' && item.survey_date !== '';
        }

        function locateUser() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(pos => {
                const latlng = [pos.coords.latitude, pos.coords.longitude];
                map.setView(latlng, 16);
                L.marker(latlng).addTo(map).bindPopup("คุณอยู่ที่นี่").openPopup();
            });
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            const filterDate = document.getElementById('map_filter_date').value;

            // Sort tasks for current filter date to get sequence numbers
            const todayTasks = queueData
                .filter(q => q.survey_date === filterDate)
                .sort((a, b) => (a.survey_time || '').localeCompare(b.survey_time || ''));

            queueData.forEach(task => {
                if (task.coords && task.coords.includes(',')) {
                    const [lat, lng] = task.coords.split(',').map(Number);
                    if (!isNaN(lat) && !isNaN(lng)) {
                        const isSelectedDate = (task.survey_date === filterDate);
                        const seq = todayTasks.findIndex(t => t.id === task.id) + 1;

                        // Map marker sequence or color
                        const color = isSelectedDate ? '#0ea5e9' : '#94a3b8'; // Blue for selected date, Gray for others

                        let icon;
                        if (isSelectedDate && seq > 0) {
                            icon = L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div class="marker-label today">${seq}</div>`,
                                iconSize: [24, 24],
                                iconAnchor: [12, 24]
                            });
                        } else {
                            icon = L.divIcon({
                                className: 'custom-div-icon',
                                html: `<div class="marker-label not-today" style="width:12px; height:12px;"></div>`,
                                iconSize: [12, 12],
                                iconAnchor: [6, 6]
                            });
                        }

                        const m = L.marker([lat, lng], { icon: icon }).addTo(map);

                        const popupContent = `
                            <div class="p-1">
                                <div class="fw-bold text-primary mb-1">${task.req_name || task.name}</div>
                                <div class="small mb-1"><b>ID:</b> ${task.id}</div>
                                <div class="small mb-1"><b>วัตถุประสงค์:</b> ${task.rent_purpose || task.leasing_purpose || '-'}</div>
                                <div class="small mb-2"><b>สถานะ/นัด:</b> ${task.status || '-'} (${task.survey_date || 'ไม่ระบุ'} ${task.survey_time || ''})</div>
                                <div class="d-flex gap-1 mt-2">
                                    <button class="btn btn-xs btn-primary flex-grow-1 py-1" onclick="openStatusModal('${task.id}')">
                                        <i class="fa-solid fa-calendar-alt"></i> นัด/อัปเดต
                                    </button>
                                    <button class="btn btn-xs btn-outline-danger py-1" onclick="startRelocateFlow('${task.id}')" title="ย้ายหมุด/ปักใหม่">
                                        <i class="fa-solid fa-map-pin"></i> ปักใหม่
                                    </button>
                                </div>
                            </div>
                        `;
                        m.bindPopup(popupContent);
                        m.taskId = task.id;
                        markers.push(m);
                    }
                }
            });
        }

        function getStatusClass(status) {
            if (!status || status === 'รอนัด') return 'status-waiting';
            if (status.includes('รังวัดแล้ว')) return 'status-surveyed';
            if (status.includes('ติดต่อไม่ได้')) return 'status-failed';
            if (status.includes('รอรังวัด') || status.includes('โทรนัดแล้ว') || status.includes('นัดแล้ว')) return 'status-called';
            if (status.includes('เลื่อนนัด')) return 'status-postponed';
            if (status.includes('ยกเลิก')) return 'status-canceled';
            return 'status-waiting';
        }

        function isScheduled(item) {
            const date = item.survey_date;
            return date && date !== '-' && date !== '' && date !== 'Invalid Date';
        }

        function getStatusBadge(status) {
            if (!status || status === 'รอนัด' || status === 'พร้อมรังวัด') return '<span class="status-badge bg-waiting">รอนัด</span>';
            if (status.includes('รังวัดแล้ว')) return '<span class="status-badge bg-surveyed">รังวัดแล้ว</span>';
            if (status.includes('ติดต่อไม่ได้')) return '<span class="status-badge bg-failed">ติดต่อไม่ได้</span>';
            if (status.includes('รอรังวัด') || status.includes('โทรนัดแล้ว') || status.includes('นัดแล้ว')) return '<span class="status-badge bg-called">นัดแล้ว</span>';
            if (status.includes('เลื่อนนัด')) return '<span class="status-badge bg-postponed">เลื่อนนัด</span>';
            if (status.includes('ยกเลิก')) return '<span class="status-badge bg-canceled">ยกเลิก</span>';
            if (status.includes('งานด่วน')) return '<span class="status-badge bg-urgent">งานด่วน</span>';
            return `<span class="status-badge bg-waiting">${status}</span>`;
        }

        function selectItem(id) {
            if (isMultiSelectMode) {
                const idx = selectedIds.indexOf(id);
                if (idx === -1) selectedIds.push(id);
                else selectedIds.splice(idx, 1);
            } else {
                currentTargetId = (currentTargetId === id) ? null : id;
                // Auto switch to schedule mode if item selected on mobile
                if (window.innerWidth <= 768 && currentTargetId) switchMode('schedule');
            }
            filterList();
            updatePlanningHeader();
            checkCollision();
        }


        function filterList() {
            const search = document.getElementById('search_box').value.toLowerCase();
            const filter = document.getElementById('status_filter').value;
            const list = document.getElementById('req_list');

            let toShow = queueData.filter(i => {
                const text = `${i.id} ${i.req_name || i.name} ${i.plot_no || ''}`.toLowerCase();
                if (!text.includes(search)) return false;

                const st = (i.status || '').trim();
                const hasDate = isScheduled(i);

                if (filter === 'pending') {
                    return st !== 'รังวัดแล้ว' && !hasDate;
                } else if (filter === 'not_called') {
                    return (!st || st === 'รอนัด' || st === 'พร้อมรังวัด') && !hasDate;
                } else if (filter === 'called') {
                    return (st.includes('โทรนัดแล้ว') || st.includes('เลื่อนนัด')) && !hasDate;
                } else if (filter === 'surveyed') {
                    return st === 'รังวัดแล้ว';
                }
                return true;
            });

            list.innerHTML = '';
            toShow.forEach(item => {
                const isSelected = isMultiSelectMode ? selectedIds.includes(item.id) : currentTargetId === item.id;
                const activeClass = isSelected ? 'selected' : '';
                const stClass = getStatusClass(item.status);

                list.innerHTML += `<div class="sidebar-item ${activeClass} ${stClass}" id="item_${item.id}"
                    onmousedown="handleDown(event, '${item.id}')" 
                    onmouseup="handleUp(event, '${item.id}')"
                    onmouseleave="handleCancel(event, '${item.id}')"
                    ontouchstart="handleDown(event, '${item.id}')"
                    ontouchend="handleUp(event, '${item.id}')"
                    oncontextmenu="return false;">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <div class="fw-bold text-dark small">${item.req_name || item.name || 'รอนัด'}</div>
                            <div class="small text-muted" style="font-size:0.75rem">${item.id} | แปลง: ${item.plot_no || '-'}</div>
                            <div class="small text-dark mt-1" style="font-size:0.7rem">
                                <i class="fa-solid fa-phone me-1 text-success"></i> ${item.req_phone || item.phone || '-'}
                            </div>
                            <div class="small text-muted mt-1" style="font-size:0.7rem; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;">
                                <i class="fa-solid fa-tag me-1 text-primary"></i> ${item.rent_purpose || item.leasing_purpose || '-'}
                            </div>
                            <div class="mt-1">${getStatusBadge(item.status)}</div>
                            ${item.remark ? `<div class="small text-muted mt-1" style="font-size:0.65rem; font-style: italic; line-height: 1.2;">โน้ต: ${item.remark}</div>` : ''}
                        </div>
                        <div class="text-primary d-flex flex-column align-items-end gap-1">
                            <div class="${isMultiSelectMode ? '' : 'd-none'} pt-1">
                                 <input type="checkbox" class="form-check-input" ${isSelected ? 'checked' : ''} style="transform: scale(1.3); pointer-events: none;">
                            </div>
                            <!-- Inline Action Menu -->
                            <div class="dropdown ${isMultiSelectMode ? 'd-none' : ''}">
                                <button class="btn btn-sm btn-light p-1 px-2 border shadow-sm" type="button" data-bs-toggle="dropdown" onclick="event.stopPropagation()">
                                    <i class="fa-solid fa-ellipsis-vertical"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow">
                                    <li><a class="dropdown-item small" href="javascript:void(0)" onclick="openStatusModal('${item.id}')"><i class="fa-solid fa-pen-to-square me-2 text-primary"></i>แก้ไขสถานะ/โน้ต</a></li>
                                    <li><a class="dropdown-item small text-danger" href="javascript:void(0)" onclick="bulkUpdateItem('${item.id}', 'ยกเลิก')"><i class="fa-solid fa-ban me-2"></i>ยกเลิกรายการ</a></li>
                                    <li><a class="dropdown-item small text-warning" href="javascript:void(0)" onclick="bulkUpdateItem('${item.id}', 'รอนัด')"><i class="fa-solid fa-rotate-left me-2"></i>ล้างวันที่/รอนัดใหม่</a></li>
                                </ul>
                            </div>
                            <i class="fa-solid ${isSelected && !isMultiSelectMode ? 'fa-check-circle' : 'fa-plus-circle opacity-25'} ${isMultiSelectMode ? 'd-none' : ''}"></i>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('count_badge').innerText = toShow.length;
            const mCount = document.getElementById('multi_count');
            if (mCount) mCount.innerText = selectedIds.length + ' รายการ';
        }

        let pressTimer;
        let longPressTriggered = false;

        function filterList() {
            const search = document.getElementById('search_box').value.toLowerCase();
            const filter = document.getElementById('status_filter').value;
            const list = document.getElementById('req_list');

            let toShow = queueData.filter(i => {
                const text = `${i.id} ${i.req_name || i.name} ${i.plot_no || ''}`.toLowerCase();
                if (!text.includes(search)) return false;

                const st = (i.status || '').trim();
                const hasDate = isScheduled(i);

                if (filter === 'pending') {
                    return st !== 'รังวัดแล้ว' && !hasDate;
                } else if (filter === 'not_called') {
                    return (!st || st === 'รอนัด' || st === 'พร้อมรังวัด') && !hasDate;
                } else if (filter === 'called') {
                    return (st.includes('โทรนัดแล้ว') || st.includes('เลื่อนนัด')) && !hasDate;
                } else if (filter === 'surveyed') {
                    return st === 'รังวัดแล้ว';
                }
                return true;
            });

            list.innerHTML = '';
            toShow.forEach(item => {
                const isSelected = isMultiSelectMode ? selectedIds.includes(item.id) : currentTargetId === item.id;
                const activeClass = isSelected ? 'selected' : '';
                const stClass = getStatusClass(item.status);

                list.innerHTML += `<div class="sidebar-item ${activeClass} ${stClass}" id="item_${item.id}"
                    onmousedown="handleDown(event, '${item.id}')" 
                    onmouseup="handleUp(event, '${item.id}')"
                    onmouseleave="handleCancel(event, '${item.id}')"
                    ontouchstart="handleDown(event, '${item.id}')"
                    ontouchend="handleUp(event, '${item.id}')"
                    oncontextmenu="return false;">
                    <div class="d-flex justify-content-between align-items-start">
                        <div class="flex-grow-1">
                            <div class="fw-bold text-dark small">${item.req_name || item.name || 'รอนัด'}</div>
                            <div class="small text-muted" style="font-size:0.75rem">${item.id} | แปลง: ${item.plot_no || '-'}</div>
                            <div class="small text-dark mt-1" style="font-size:0.7rem">
                                <i class="fa-solid fa-phone me-1 text-success"></i> ${item.req_phone || item.phone || '-'}
                            </div>
                            <div class="small text-muted mt-1" style="font-size:0.7rem; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;">
                                <i class="fa-solid fa-tag me-1 text-primary"></i> ${item.rent_purpose || item.leasing_purpose || '-'}
                            </div>
                            <div class="mt-1">${getStatusBadge(item.status)}</div>
                            ${item.remark ? `<div class="small text-muted mt-1" style="font-size:0.65rem; font-style: italic; line-height: 1.2;">โน้ต: ${item.remark}</div>` : ''}
                        </div>
                        <div class="text-primary d-flex flex-column align-items-end gap-1">
                            <div class="${isMultiSelectMode ? '' : 'd-none'} pt-1">
                                 <input type="checkbox" class="form-check-input" ${isSelected ? 'checked' : ''} style="transform: scale(1.3); pointer-events: none;">
                            </div>
                            <!-- Inline Action Menu -->
                            <div class="dropdown ${isMultiSelectMode ? 'd-none' : ''}">
                                <button class="btn btn-sm btn-light p-1 px-2 border shadow-sm" type="button" data-bs-toggle="dropdown" onclick="event.stopPropagation()">
                                    <i class="fa-solid fa-ellipsis-vertical"></i>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow">
                                    <li><a class="dropdown-item small" href="javascript:void(0)" onclick="openStatusModal('${item.id}')"><i class="fa-solid fa-pen-to-square me-2 text-primary"></i>แก้ไขสถานะ/โน้ต</a></li>
                                    <li><a class="dropdown-item small text-danger" href="javascript:void(0)" onclick="bulkUpdateItem('${item.id}', 'ยกเลิก')"><i class="fa-solid fa-ban me-2"></i>ยกเลิกรายการ</a></li>
                                    <li><a class="dropdown-item small text-warning" href="javascript:void(0)" onclick="bulkUpdateItem('${item.id}', 'รอนัด')"><i class="fa-solid fa-rotate-left me-2"></i>ล้างวันที่/รอนัดใหม่</a></li>
                                </ul>
                            </div>
                            <i class="fa-solid ${isSelected && !isMultiSelectMode ? 'fa-check-circle' : 'fa-plus-circle opacity-25'} ${isMultiSelectMode ? 'd-none' : ''}"></i>
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById('count_badge').innerText = toShow.length;
            const mCount = document.getElementById('multi_count');
            if (mCount) mCount.innerText = selectedIds.length + ' รายการ';
        }

        function handleDown(e, id) {
            longPressTriggered = false;
            const el = document.getElementById('item_' + id);
            if (el) el.classList.add('pressing');

            // Only start timer if NOT already in multi-select mode
            if (!isMultiSelectMode) {
                pressTimer = window.setTimeout(() => {
                    longPressTriggered = true;
                    toggleMultiMode();
                    selectItem(id);
                    if (navigator.vibrate) navigator.vibrate(50);
                    if (el) el.classList.remove('pressing');
                }, 700); // 0.7 second hold for PC/Mobile
            }
        }

        function handleUp(e, id) {
            const el = document.getElementById('item_' + id);
            if (el) el.classList.remove('pressing');

            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }

            if (!longPressTriggered) {
                // Regular click or already in multi-mode
                selectItem(id);
            }
        }

        function handleCancel(e, id) {
            const el = document.getElementById('item_' + id);
            if (el) el.classList.remove('pressing');
            if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
            }
        }

        function toggleMultiMode() {
            isMultiSelectMode = !isMultiSelectMode;
            const actionBox = document.getElementById('multi_actions');
            const header = document.getElementById('sidebar_header');
            const title = document.getElementById('sidebar_title');

            if (isMultiSelectMode) {
                if (actionBox) actionBox.classList.remove('d-none');
                header.classList.add('bulk-mode-header');
                title.innerHTML = '<i class="fa-solid fa-object-group me-2"></i>โหมดเลือกกลุ่ม';
                currentTargetId = null;
                selectedIds = [];
            } else {
                if (actionBox) actionBox.classList.add('d-none');
                header.classList.remove('bulk-mode-header');
                title.innerHTML = '<i class="fa-solid fa-headset me-2"></i>รอรังวัด/รอนัด';
                selectedIds = [];
            }
            filterList();
            updatePlanningHeader();
        }

        async function bulkUpdate(status) {
            if (selectedIds.length === 0) {
                Swal.fire('แจ้งเตือน', 'กรุณาเลือกรายการที่ต้องการก่อน', 'info');
                return;
            }
            const actionText = status === 'ยกเลิก' ? 'ยกเลิก' : 'ล้างคิวนัดเป็นรอนัด';
            const { isConfirmed } = await Swal.fire({
                title: `ยืนยัน${actionText}?`,
                text: `คุณกำลังจัดการ ${selectedIds.length} รายการพร้อมกัน`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก'
            });
            if (isConfirmed) {
                saveBulkStatusUpdate(selectedIds, { status: status, remark: `อัปเดตกลุ่ม: ${actionText}` });
            }
        }

        async function bulkUpdateItem(id, status) {
            const actionText = status === 'ยกเลิก' ? 'ยกเลิก' : 'ล้างคิวนัดเป็นรอนัด';
            const { isConfirmed } = await Swal.fire({
                title: `ยืนยัน${actionText}?`,
                text: `รายการ ID: ${id}`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก'
            });
            if (isConfirmed) {
                saveBulkStatusUpdate([id], { status: status, remark: `อัปเดตเดี่ยว: ${actionText}` });
            }
        }

        function selectAll(checked) {
            if (checked) {
                // Get current filtered list items
                const search = document.getElementById('search_box').value.toLowerCase();
                const filter = document.getElementById('status_filter').value;
                const filteredItems = queueData.filter(i => {
                    const text = `${i.id} ${i.req_name || i.name} ${i.plot_no || ''}`.toLowerCase();
                    if (!text.includes(search)) return false;
                    const st = (i.status || '').trim();
                    const hasDate = isScheduled(i);
                    if (filter === 'pending') return st !== 'รังวัดแล้ว' && !hasDate;
                    if (filter === 'not_called') return (!st || st === 'รอนัด' || st === 'พร้อมรังวัด') && !hasDate;

                    if (filter === 'surveyed') return st === 'รังวัดแล้ว';
                    return true;
                });
                selectedIds = filteredItems.map(i => i.id);

                selectedIds = [];

            updatePlanningHeader();

        async function saveBulkStatusUpdate(ids, data) {
            document.getElementById('sync_spinner').classList.remove('d-none');
            const toast = Swal.mixin({
                toast: true, position: 'top-end', showConfirmButton: false, timer: 3000
            });
            toast.fire({ icon: 'info', title: `กำลังอัปเดต ${ids.length} รายการ...` });

            // Optimistic Update
            ids.forEach(id => {
                const idx = queueData.findIndex(q => q.id === id);
                if (idx !== -1) {
                    queueData[idx].status = data.status;
                    queueData[idx].remark = data.remark;
                    const needsDate = (data.status === 'รอรังวัด' || (data.status === 'เลื่อนนัด' && data.date));
                    if (needsDate) {
                        queueData[idx].survey_date = data.date;
                        queueData[idx].survey_time = data.time;
                    } else {
                        queueData[idx].survey_date = '-';
                        queueData[idx].survey_time = '-';
                    }
                }
            });
            filterList();
            updateDailySchedule();
            renderMarkers();

            try {
                // Since updateSurveyItem handles single, we might need a loop or specific action
                // For safety and minimal GAS change, we can loop but better to use save_survey_schedule if possible
                // OR implement action: bulk_update_status

                // Let's use loop for now as GAS already handles many concurrent requests
                const promises = ids.map(id => {
                    let payload = {
                        action: 'update_survey_item',
                        case_id: id,
                        new_status: data.status,
                        remark: data.remark,
                        update_type: (data.status === 'รอรังวัด' || data.status === 'เลื่อนนัด') ? 'reschedule' : 'status_and_remark',
                        new_date: data.date || '-',
                        new_time: data.time || '-'
                    };
                    return fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                });

                await Promise.all(promises);
                document.getElementById('sync_spinner').classList.add('d-none');
                toast.fire({ icon: 'success', title: 'อัปเดตกลุ่มสำเร็จ' });
                toggleMultiMode(); // Reset mode
                loadQueueFromSheet();
            } catch (e) {
                document.getElementById('sync_spinner').classList.add('d-none');
                toast.fire({ icon: 'error', title: 'ล้มเหลวบางรายการ' });
            }
        }

        async function saveStatusUpdate(id, data) {
            const itemIdx = queueData.findIndex(q => q.id === id);
            if (itemIdx !== -1) {
                const needsDate = (data.status === 'รอรังวัด' || (data.status === 'เลื่อนนัด' && data.date && data.date !== '-'));
                queueData[itemIdx].status = data.status;
                queueData[itemIdx].remark = data.remark;
                if (needsDate) {
                    queueData[itemIdx].survey_date = data.date || queueData[itemIdx].survey_date;
                    queueData[itemIdx].survey_time = data.time || queueData[itemIdx].survey_time;
                } else {
                    queueData[itemIdx].survey_date = '-';
                    queueData[itemIdx].survey_time = '-';
                }
                filterList();
                updateDailySchedule();
            }

            document.getElementById('sync_spinner').classList.remove('d-none');
            const toast = Swal.mixin({
                toast: true, position: 'top-end', showConfirmButton: false, timer: 3000, timerProgressBar: true
            });
            toast.fire({ icon: 'info', title: 'กำลังบันทึกข้อมูล...' });

            try {
                const payload = {
                    action: 'update_survey_item',
                    case_id: id,
                    new_status: data.status,
                    remark: data.remark,
                    update_type: (data.status === 'รอรังวัด' || data.status === 'เลื่อนนัด') ? 'reschedule' : 'status_and_remark',
                    new_date: (data.status === 'รอรังวัด' || data.status === 'เลื่อนนัด') ? (data.date || '-') : '-',
                    new_time: (data.status === 'รอรังวัด' || data.status === 'เลื่อนนัด') ? (data.time || '-') : '-'
                };

                fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                }).then(() => {
                    document.getElementById('sync_spinner').classList.add('d-none');
                    toast.fire({ icon: 'success', title: 'บันทึกสำเร็จ' });
                    setTimeout(loadQueueFromSheet, 2000);
                }).catch(e => {
                    document.getElementById('sync_spinner').classList.add('d-none');
                    toast.fire({ icon: 'error', title: 'การบันทึกล้มเหลว' });
                    loadQueueFromSheet();
                });

                document.getElementById('sync_spinner').classList.add('d-none');

        function renderMonthlyCalendar() {
            const grid = document.getElementById('calendar_grid');
            const myLabel = document.getElementById('calendar_month_year');
            const selectedDate = document.getElementById('survey_date').value;

            if (!grid || !myLabel) return;

            const months = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            myLabel.innerText = `${months[calendarMonth]} ${calendarYear + 543}`;

            grid.innerHTML = '';
            const dayHeaders = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];
            dayHeaders.forEach(h => {
                grid.innerHTML += `<div class="calendar-day-header">${h}</div>`;
            });

            const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
            const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${calendarYear}-${String(calendarMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const isActive = (dateStr === selectedDate);
                const isToday = (dateStr === new Date().toISOString().split('T')[0]);

                const tasksOnDay = queueData.filter(q => {
                    let sDate = q.survey_date;
                    if (!sDate || sDate === '-') return false;
                    if (typeof sDate === 'string' && sDate.includes('T')) sDate = sDate.split('T')[0];
                    return sDate === dateStr;
                });

                let dotClass = '';
                if (tasksOnDay.length > 0) {
                    const allDone = tasksOnDay.every(t => t.status === 'รังวัดแล้ว' || t.status === 'ยกเลิก');
                    dotClass = allDone ? 'dot-gray' : 'dot-blue';
                    if (tasksOnDay.some(t => t.status && t.status.includes("งานด่วน"))) dotClass = 'dot-urgent';
                }

                grid.innerHTML += `
                    <div class="calendar-day ${isActive ? 'active' : ''} ${isToday ? 'today' : ''}" onclick="setCalendarDate('${dateStr}')">
                        ${d}
                        ${dotClass ? `<div class="calendar-dot ${dotClass}"></div>` : ''}
                    </div>
                `;
            }
        }

        function suggestNextTime() {
            const dateInput = document.getElementById('survey_date').value;
            const timeInput = document.getElementById('target_time');
            const interval = parseInt(document.getElementById('target_interval').value) || 45;
            const wStart = document.getElementById('work_start').value || "08:30";

            if (!timeInput) return;

            const tasksToday = queueData.filter(q => {
                let sDate = q.survey_date;
                if (!sDate || sDate === '-') return false;
                if (typeof sDate === 'string' && sDate.includes('T')) sDate = sDate.split('T')[0];
                return sDate === dateInput;
            }).sort((a, b) => (a.survey_time || '').localeCompare(b.survey_time || ''));

            if (tasksToday.length > 0) {
                const lastTask = tasksToday[tasksToday.length - 1];
                if (lastTask.survey_time && lastTask.survey_time.includes(':')) {
                    const lastMins = timeToMinutes(lastTask.survey_time);
                    timeInput.value = minutesToTime(lastMins + interval);
                } else {
                    timeInput.value = wStart;
                }
            } else {
                timeInput.value = wStart;
            }
            checkCollision();
        }

        async function reorderSchedule(date) {
            const tbody = document.getElementById('schedule_body');
            const rows = tbody.querySelectorAll('tr[data-id]');
            const newOrderIds = Array.from(rows).map(row => row.getAttribute('data-id'));

            // Generate list of times currently in use to redistribute them or just keep order
            // Usually, we want to maintain the same time slots but move the people
            const sortedTasks = queueData.filter(q => {
                let sDate = q.survey_date;
                if (!sDate || sDate === '-') return false;
                if (typeof sDate === 'string' && sDate.includes('T')) sDate = sDate.split('T')[0];
                return sDate === date;
            }).sort((a, b) => (a.survey_time || '').localeCompare(b.survey_time || ''));

            const existingTimes = sortedTasks.map(t => t.survey_time);

            const updates = [];
            newOrderIds.forEach((id, index) => {
                const targetTime = existingTimes[index] || '09:00'; // Fallback
                const item = queueData.find(q => q.id === id);
                if (item && item.survey_time !== targetTime) {
                    item.survey_time = targetTime;
                    updates.push({
                        id: id,
                        time: targetTime
                    });
                }
            });

            if (updates.length > 0) {
                document.getElementById('sync_spinner').classList.remove('d-none');
                const promises = updates.map(u => {
                    const payload = {
                        action: 'update_survey_item',
                        update_type: 'reschedule',
                        case_id: u.id,
                        new_date: date,
                        new_time: u.time,
                        new_status: queueData.find(q => q.id === u.id).status
                    };
                    return fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                });

                await Promise.all(promises);
                document.getElementById('sync_spinner').classList.add('d-none');
                loadQueueFromSheet();
            }
        }

        async function saveNewOrder(date) {
            const tbody = document.getElementById('schedule_body');
            const rows = tbody.querySelectorAll('tr[data-id]');
            const newOrderIds = Array.from(rows).map(row => row.getAttribute('data-id'));

            // Get existing times for this date from the OLD order to maintain the same slots
            const tasksToday = queueData.filter(q => {
                let sDate = q.survey_date;
                if (!sDate || sDate === '-') return false;
                if (typeof sDate === 'string' && sDate.includes('T')) sDate = sDate.split('T')[0];
                return sDate === date;
            }).sort((a, b) => (a.survey_time || '').localeCompare(b.survey_time || ''));

            const existingTimes = tasksToday.map(t => t.survey_time);

            const updates = [];
            newOrderIds.forEach((id, index) => {
                const targetTime = existingTimes[index] || '09:00';

                // Update Local Data immediately for UI smoothness
                const idx = queueData.findIndex(q => q.id === id);
                if (idx !== -1) queueData[idx].survey_time = targetTime;

                updates.push({ id: id, time: targetTime });
            });

            // Refresh UI immediately
            updateDailySchedule();

            // Show subtle background sync indicator
            const syncIcon = document.getElementById('sync_spinner');
            if (syncIcon) syncIcon.classList.remove('d-none');

            try {
                // Send background update
                const promises = updates.map(u => {
                    const payload = {
                        action: 'update_survey_item',
                        case_id: u.id,
                        update_type: 'reschedule',
                        new_date: date,
                        new_time: u.time
                    };
                    return fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                });

                await Promise.all(promises);
                if (syncIcon) syncIcon.classList.add('d-none');
            } catch (e) {
                console.error("BG Sync Failed", e);
                if (syncIcon) syncIcon.classList.add('d-none');
                loadQueueFromSheet(); // Re-sync if failed
            }
        }

        function checkCollision() {
            const date = document.getElementById('survey_date').value;
            const time = document.getElementById('target_time').value;
            const warning = document.getElementById('collision_warning');
            const btn = document.getElementById('btn_save_planning');

            if (!isMultiSelectMode && !currentTargetId) {
                if (btn) btn.disabled = true;
                return;
            }
            if (isMultiSelectMode && selectedIds.length === 0) {
                if (btn) btn.disabled = true;
                return;
            }

            if (!date || !time) {
                if (warning) warning.classList.add('d-none');
                if (btn) btn.disabled = true;
                return;
            }

            const cleanTime = (time.length === 5 ? time : time.substring(0, 5));
            const conflict = queueData.find(q => q.survey_date === date && q.survey_time === cleanTime);

            if (conflict && conflict.id !== currentTargetId && !selectedIds.includes(conflict.id)) {
                if (warning) {
                    warning.classList.remove('d-none');
                    document.getElementById('collision_text').innerText = `ชนกับ: ${conflict.req_name || conflict.name} (${conflict.id})`;
                }
                if (btn) btn.disabled = true;
            } else {
                if (warning) warning.classList.add('d-none');
                if (btn) btn.disabled = false;
            }
        }

        async function savePlannedItem() {
            const date = document.getElementById('survey_date').value;
            const startTimeStr = document.getElementById('target_time').value;
            const interval = parseInt(document.getElementById('target_interval').value) || 45;
            const wStart = document.getElementById('work_start').value;
            const wEnd = document.getElementById('work_end').value;

            if (!date || !startTimeStr) return;
            const idsToUpdate = isMultiSelectMode ? [...selectedIds] : [currentTargetId];
            if (idsToUpdate.length === 0 || !idsToUpdate[0]) return;

            let currentTimeMinutes = timeToMinutes(startTimeStr);
            const scheduleData = [];
            let currentIdx = 0;

            // Helper to check if time is occupied by existing items NOT in our current selection
            const isOccupied = (tStr) => {
                return queueData.some(q => q.survey_date === date && q.survey_time === tStr && !idsToUpdate.includes(q.id));
            };

            while (currentIdx < idsToUpdate.length) {
                let timeStr = minutesToTime(currentTimeMinutes);

                // If collision or outside workday (optional), ask user or shift
                if (isOccupied(timeStr)) {
                    const result = await Swal.fire({
                        title: 'พบเวลาทับซ้อน',
                        text: `เวลา ${timeStr} มีนัดหมายอยู่แล้ว ต้องการขยับไปเวลาว่างถัดไปหรือไม่?`,
                        icon: 'question',
                        showCancelButton: true,
                        confirmButtonText: 'ขยับเวลาอัตโนมัติ',
                        cancelButtonText: 'ยกเลิกทั้งหมด'
                    });

                    if (result.isConfirmed) {
                        // Find next free slot
                        while (isOccupied(timeStr)) {
                            currentTimeMinutes += interval;
                            timeStr = minutesToTime(currentTimeMinutes);
                        }
                    } else {
                        return; // Cancel the whole operation
                    }
                }

                scheduleData.push({
                    id: idsToUpdate[currentIdx],
                    time: timeStr
                });

                // Update Local Data (Optimistic)
                const idx = queueData.findIndex(q => q.id === idsToUpdate[currentIdx]);
                if (idx !== -1) {
                    queueData[idx].survey_date = date;
                    queueData[idx].survey_time = timeStr;
                    queueData[idx].status = 'รอรังวัด';
                }

                currentTimeMinutes += interval;
                currentIdx++;
            }

            // UI Refresh
            if (!isMultiSelectMode) currentTargetId = null;
            else selectedIds = [];

            updatePlanningHeader();
            filterList();
            updateDailySchedule();
            renderMarkers();

            document.getElementById('sync_spinner').classList.remove('d-none');
            const toast = Swal.mixin({
                toast: true, position: 'top-end', showConfirmButton: false, timer: 2000
            });
            toast.fire({ icon: 'info', title: `กำลังนัดหมาย ${scheduleData.length} รายการ...` });

            try {
                const schedule = scheduleData.map(s => ({
                    id: s.id,
                    timeSlot: s.time,
                    date: date
                }));

                const payload = {
                    action: 'save_survey_schedule',
                    survey_date: date,
                    schedule: schedule
                };

                fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                }).then(() => {
                    document.getElementById('sync_spinner').classList.add('d-none');
                    toast.fire({ icon: 'success', title: 'นัดหมายสำเร็จ' });
                    if (isMultiSelectMode) toggleMultiMode();

                    // On mobile, automatically show the schedule we just populated
                    if (window.innerWidth <= 768) switchMode('schedule');

                    setTimeout(loadQueueFromSheet, 3500); // Wait bit more for GAS sync
                }).catch(e => {
                    document.getElementById('sync_spinner').classList.add('d-none');
                    Swal.fire('Error', 'ไม่สามารถบันทึกได้', 'error');
                });

            } catch (e) {
                document.getElementById('sync_spinner').classList.add('d-none');
                Swal.fire('Error', 'ไม่สามารถบันทึกได้', 'error');
            }
        }

        function timeToMinutes(t) {
            const [h, m] = t.split(':').map(Number);
            return (h * 60) + m;
        }

        function minutesToTime(m) {
            const h = Math.floor(m / 60);
            const mm = m % 60;
            return `${h.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
        }
