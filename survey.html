        function getRandomColor() {
            const letters = '0123456789ABCDEF';
            let color = '#';
            for (let i = 0; i < 6; i++) { color += letters[Math.floor(Math.random() * 16)]; }
            return color;
        }

        function loadGeoJSONLayers() {
            fetch(GAS_URL + '?action=get_map_list')
                .then(r => r.json())
                .then(res => {
                    if (res.status === 'success' && res.list) {
                        res.list.forEach(fileInfo => {
                            fetch(GAS_URL + '?action=get_map_data&id=' + fileInfo.id)
                                .then(r => r.json())
                                .then(fileRes => {
                                    if (fileRes.status === 'success') {
                                        try {
                                            let jsonData = JSON.parse(fileRes.data_string);
                                            let color = getRandomColor();
                                            let layer = L.geoJSON(jsonData, {
                                                style: { color: color, weight: 2, opacity: 1, fillColor: color, fillOpacity: 0.2 },
                                                onEachFeature: (feature, l) => {
                                                    let p = feature.properties;
                                                    let name = p["Land numbe"] || p["Land number"] || p.plot_no || p.Name || '-';
                                                    let area_str = `${p.rai || 0} ไร่ ${p.ngan || 0} งาน ${p.sqwa || 0} วา`;
                                                    l.bindPopup(`<b>ไฟล์: ${fileInfo.filename}</b><br>แปลงที่: ${name}<br>เนื้อที่: ${area_str}`);
                                                }
                                            });
                                            let displayName = fileInfo.filename.replace('.json', '').replace('.geojson', '');
                                            layerControl.addOverlay(layer, `<span style="color:${color}; font-weight:bold;">■</span> ${displayName}`);
                                        } catch (e) { console.error("Parse Error:", e); }
                                    }
                                });
                        });
                    }
                });
        }

        function switchMode(mode) {
            document.querySelectorAll('.mobile-tab-bar button').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('tab_' + mode + '_mode');
            if (btn) btn.classList.add('active');

            const isMob = window.innerWidth <= 768;
            const s = document.getElementById('col-sidebar'),
                m = document.getElementById('col-main'),
                mp = document.getElementById('col-map');

            if (isMob) {
                // Remove active class from all
                s.classList.remove('active-mobile-view');
                m.classList.remove('active-mobile-view');
                mp.classList.remove('active-mobile-view');

                if (mode === 'list') {
                    s.classList.add('active-mobile-view');
                } else if (mode === 'schedule') {
                    m.classList.add('active-mobile-view');
                } else if (mode === 'map') {
                    mp.classList.add('active-mobile-view');
                    setTimeout(() => {
                        map.invalidateSize();
                    }, 400);
                }
            } else {
                s.style.display = m.style.display = mp.style.display = 'flex';
            }

            // Adjust markers or stage-view if needed
            document.querySelectorAll('.stage-view').forEach(v => v.classList.remove('active'));
            if (mode === 'schedule' || !isMob) {
                document.getElementById('view_schedule').classList.add('active');
            }
        }

        function renderFieldList() {
            const container = document.getElementById('field_list_container');
            const targetDate = document.getElementById('field_view_date').value;
            const tasks = queueData.filter(q => q.survey_date === targetDate);

            container.innerHTML = tasks.length ? '' : `<div class="p-5 text-center opacity-50">ไม่มีงานในวันที่ ${targetDate}</div>`;
            tasks.forEach(task => {
                const stBadge = getStatusBadge(task.status);
                const stClass = getStatusClass(task.status);
                container.innerHTML += `<div class="col-xl-6">
                    <div class="premium-card position-relative ${stClass}">
                        <div class="d-flex justify-content-between align-items-start">
                            <span class="badge bg-light text-primary fw-bold mb-2">${task.survey_time || '--:--'}</span>
                            <div class="text-end">
                                <span class="small text-muted d-block">${task.id}</span>
                                ${stBadge}
                            </div>
                        </div>
                        <h6 class="fw-bold mb-1">${task.req_name || task.name}</h6>
                        <div class="small opacity-75 mb-1">แปลง: ${task.plot_no || '-'}</div>
                        <div class="small text-muted mb-3 italic">"${task.remark || '-'}"</div>
                        <div class="d-flex gap-2">
                            <a href="tel:${task.req_phone || task.phone}" class="btn btn-sm btn-success rounded-pill px-3"><i class="fa-solid fa-phone"></i> โทร</a>
                            <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="focusOnPin('${task.id}')">แผนที่</button>
                            <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="openStatusModal('${task.id}')">บันทึกเพิ่ม</button>
                        </div>
                    </div>
                </div>`;
            });
        }

        function focusOnPin(id) {
            switchMode('map');
            const m = markers.find(m => m.taskId === id);
            if (m) {
                // Wait for the tab transition and invalidateSize to complete
                setTimeout(() => {
                    map.setView(m.getLatLng(), 18);
                    m.openPopup();
                }, 500);
            } else {
                Swal.fire('ค้นหาไม่พบ', 'ไม่พบพิกัดตำแหน่งงานนี้บนแผนที่', 'warning');
            }
        }

        function initResizers() {
            const resizer1 = document.getElementById('resizer-1');
            const resizer2 = document.getElementById('resizer-2');
            const sidebar = document.getElementById('col-sidebar');
            const mapSection = document.getElementById('col-map');

            let isResizing = false;

            resizer1.addEventListener('mousedown', (e) => {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
            });

            resizer2.addEventListener('mousedown', (e) => {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
            });

            document.addEventListener('mousemove', (e) => {
                if (!isResizing) return;

                if (e.target === resizer1 || isResizing) {
                    // Logic to resize sidebar or map would be here
                    // Simplified for now: just track if we are in resizing mode
                }
            });

            document.addEventListener('mouseup', () => {
                isResizing = false;
                document.body.style.cursor = 'default';
                map.invalidateSize();
            });
        }
    </script>
</body>
